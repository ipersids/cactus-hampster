syntax = "proto3";

package controller;

message ControllerRequest {
	oneof msg {
		PingMessage ping = 1;
		PongMessage pong = 2;
	}
}

message ServerResponse {
	oneof msg {
		PingMessage ping = 1;
		PongMessage pong = 2;
	}
}

message PingMessage {
	string msg = 1;
}

message PongMessage {
	string msg = 1;
}